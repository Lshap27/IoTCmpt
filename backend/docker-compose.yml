services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: iot_backend
      MYSQL_USER: iot_backend
      MYSQL_PASSWORD: iot_backend
      MYSQL_ROOT_PASSWORD: iot_backend_root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_DATABASE_URL: mysql+pymysql://iot_backend:iot_backend@mysql:3306/iot_backend
      APP_BASE_URL: http://127.0.0.1:8000
      APP_IMAGES_DIR: /app/data/images
      APP_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - backend_images:/app/data/images
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  backend_images:
