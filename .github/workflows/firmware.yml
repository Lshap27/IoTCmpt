name: firmware

on:
  push:
    branches: [main]
    paths: ["firmware/**", "contracts/**", "tools/generate-contracts.py", ".github/workflows/firmware.yml"]
  pull_request:
    paths: ["firmware/**", "contracts/**", "tools/generate-contracts.py", ".github/workflows/firmware.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ESP32-S3 firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.2
          target: esp32s3
          path: firmware/esp32s3
