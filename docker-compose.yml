services:
  postgres:
    image: timescale/timescaledb:2.20.0-pg16
    # Explicit preload keeps timescaledb loadable even when reusing a volume
    # initialized by the plain postgres image.
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    environment:
      POSTGRES_DB: aiot
      POSTGRES_USER: aiot
      POSTGRES_PASSWORD: aiot
    ports:
      - "5432:5432"
    volumes:
      - aiot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiot -d aiot"]
      interval: 5s
      timeout: 3s
      retries: 20

  emqx:
    image: emqx/emqx:5.8.8
    environment:
      EMQX_NAME: aiot-emqx
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
    ports:
      - "1883:1883"
      - "18083:18083"
    volumes:
      - aiot_emqx_data:/opt/emqx/data
      - aiot_emqx_log:/opt/emqx/log

  server:
    build:
      context: ./server
    environment:
      AIOT_DATABASE_URL: postgresql+psycopg://aiot:aiot@postgres:5432/aiot
      AIOT_AUTO_CREATE_TABLES: "false"
      AIOT_BASE_URL: http://localhost:8000
      AIOT_UPLOADS_DIR: /app/uploads
      AIOT_MAX_IMAGES_PER_DEVICE: 100
      AIOT_POSE_ENABLED: ${AIOT_POSE_ENABLED:-true}
      AIOT_POSE_MODEL_PATH: /app/models/pose_landmarker_full.task
      AIOT_POSE_DETECTION_CONFIDENCE: ${AIOT_POSE_DETECTION_CONFIDENCE:-0.3}
      AIOT_POSE_PRESENCE_CONFIDENCE: ${AIOT_POSE_PRESENCE_CONFIDENCE:-0.3}
      AIOT_MQTT_ENABLED: "true"
      AIOT_MQTT_HOST: emqx
      AIOT_MQTT_PORT: "1883"
      AIOT_CORS_ORIGINS: ${AIOT_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      AIOT_LLM_ENDPOINT: ${AIOT_LLM_ENDPOINT:-https://api.deepseek.com}
      AIOT_LLM_API_KEY: ${AIOT_LLM_API_KEY:-}
      AIOT_LLM_MODEL: ${AIOT_LLM_MODEL:-deepseek-v4-flash}
      AIOT_LLM_TIMEOUT_SECONDS: ${AIOT_LLM_TIMEOUT_SECONDS:-60}
      AIOT_LLM_RESPONSE_FORMAT: ${AIOT_LLM_RESPONSE_FORMAT:-json_object}
      AIOT_LLM_THINKING_ENABLED: ${AIOT_LLM_THINKING_ENABLED:-false}
      AIOT_LLM_REASONING_EFFORT: ${AIOT_LLM_REASONING_EFFORT:-high}
      AIOT_AUTOPILOT_ENABLED: ${AIOT_AUTOPILOT_ENABLED:-true}
      AIOT_AUTOPILOT_COOLDOWN_SECONDS: ${AIOT_AUTOPILOT_COOLDOWN_SECONDS:-120}
      AIOT_AUTOPILOT_MIN_CONFIDENCE: ${AIOT_AUTOPILOT_MIN_CONFIDENCE:-0.6}
      # 已废弃：空气质量与烟雾自动规则由固件本地执行。
      AIOT_AUTOPILOT_TRIGGER_LEVELS: ${AIOT_AUTOPILOT_TRIGGER_LEVELS:-alert}
      AIOT_VISION_INTERVAL_ENABLED: ${AIOT_VISION_INTERVAL_ENABLED:-false}
      AIOT_VISION_INTERVAL_SECONDS: ${AIOT_VISION_INTERVAL_SECONDS:-300}
      AIOT_VISION_IMAGE_MAX_AGE_SECONDS: ${AIOT_VISION_IMAGE_MAX_AGE_SECONDS:-15}
      AIOT_SEDENTARY_THRESHOLD_SECONDS: ${AIOT_SEDENTARY_THRESHOLD_SECONDS:-7200}
      AIOT_SMOKE_SILENCE_SECONDS: ${AIOT_SMOKE_SILENCE_SECONDS:-60}
    ports:
      - "8000:8000"
    volumes:
      - aiot_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started

  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_* 是构建期内联变量，运行期 environment 对已构建的 bundle 无效
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  aiot_postgres_data:
  aiot_emqx_data:
  aiot_emqx_log:
  aiot_uploads:
