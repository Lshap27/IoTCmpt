services:
  postgres:
    image: timescale/timescaledb:2.20.0-pg16
    # Explicit preload keeps timescaledb loadable even when reusing a volume
    # initialized by the plain postgres image.
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    environment:
      POSTGRES_DB: aiot
      POSTGRES_USER: aiot
      POSTGRES_PASSWORD: aiot
    ports:
      - "5432:5432"
    volumes:
      - aiot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiot -d aiot"]
      interval: 5s
      timeout: 3s
      retries: 20

  emqx:
    image: emqx/emqx:5.8.8
    environment:
      EMQX_NAME: aiot-emqx
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
    ports:
      - "1883:1883"
      - "18083:18083"
    volumes:
      - aiot_emqx_data:/opt/emqx/data
      - aiot_emqx_log:/opt/emqx/log

  server:
    build:
      context: ./server
    environment:
      AIOT_DATABASE_URL: postgresql+psycopg://aiot:aiot@postgres:5432/aiot
      AIOT_AUTO_CREATE_TABLES: "false"
      AIOT_BASE_URL: http://localhost:8000
      AIOT_UPLOADS_DIR: /app/uploads
      AIOT_MAX_IMAGES_PER_DEVICE: 100
      AIOT_POSE_ENABLED: ${AIOT_POSE_ENABLED:-true}
      AIOT_POSE_MODEL_PATH: /app/models/pose_landmarker_full.task
      AIOT_POSE_DETECTION_CONFIDENCE: ${AIOT_POSE_DETECTION_CONFIDENCE:-0.3}
      AIOT_POSE_PRESENCE_CONFIDENCE: ${AIOT_POSE_PRESENCE_CONFIDENCE:-0.3}
      AIOT_POSE_TRACKING_CONFIDENCE: ${AIOT_POSE_TRACKING_CONFIDENCE:-0.3}
      AIOT_POSE_LANDMARK_VISIBILITY: ${AIOT_POSE_LANDMARK_VISIBILITY:-0.5}
      AIOT_POSE_FORWARD_LEAN_DEGREES: ${AIOT_POSE_FORWARD_LEAN_DEGREES:-20}
      AIOT_POSE_HUNCH_RATIO: ${AIOT_POSE_HUNCH_RATIO:-0.25}
      AIOT_POSE_HEAD_DOWN_DEGREES: ${AIOT_POSE_HEAD_DOWN_DEGREES:-25}
      AIOT_PERSON_DETECTION_ENABLED: ${AIOT_PERSON_DETECTION_ENABLED:-true}
      AIOT_PERSON_DETECTION_MODEL_PATH: /app/models/efficientdet_lite0_int8.tflite
      AIOT_PERSON_DETECTION_CONFIDENCE: ${AIOT_PERSON_DETECTION_CONFIDENCE:-0.35}
      AIOT_MQTT_ENABLED: "true"
      AIOT_MQTT_HOST: emqx
      AIOT_MQTT_PORT: "1883"
      AIOT_COMMAND_ACK_TIMEOUT_SECONDS: ${AIOT_COMMAND_ACK_TIMEOUT_SECONDS:-60}
      AIOT_MCP_INTERNAL_TOKEN: ${AIOT_MCP_INTERNAL_TOKEN:?configure AIOT_MCP_INTERNAL_TOKEN first}
      AIOT_MCP_ENABLED: ${AIOT_MCP_ENABLED:-false}
      AIOT_MCP_READ_TOKEN: ${AIOT_MCP_READ_TOKEN:-}
      AIOT_MCP_CONTROL_TOKEN: ${AIOT_MCP_CONTROL_TOKEN:-}
      AIOT_MCP_ALLOWED_ORIGINS: ${AIOT_MCP_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      AIOT_MCP_ALLOWED_HOSTS: ${AIOT_MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,server,aiot.internal}
      AIOT_MCP_RATE_LIMIT_PER_MINUTE: ${AIOT_MCP_RATE_LIMIT_PER_MINUTE:-60}
      AIOT_CORS_ORIGINS: ${AIOT_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "8000:8000"
    volumes:
      - aiot_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: ./server
    command: ["python", "-m", "app.worker_main"]
    environment:
      AIOT_DATABASE_URL: postgresql+psycopg://aiot:aiot@postgres:5432/aiot
      AIOT_AUTO_CREATE_TABLES: "false"
      AIOT_GATEWAY_INTERNAL_URL: http://server:8000
      AIOT_MCP_INTERNAL_TOKEN: ${AIOT_MCP_INTERNAL_TOKEN:?configure AIOT_MCP_INTERNAL_TOKEN first}
      AIOT_AI_WORKER_ENABLED: "true"
      AIOT_AI_WORKER_POLL_SECONDS: ${AIOT_AI_WORKER_POLL_SECONDS:-0.5}
      AIOT_AI_WORKER_LEASE_SECONDS: ${AIOT_AI_WORKER_LEASE_SECONDS:-90}
      AIOT_AI_WORKER_HEARTBEAT_SECONDS: ${AIOT_AI_WORKER_HEARTBEAT_SECONDS:-15}
      AIOT_AI_WORKER_MAX_ATTEMPTS: ${AIOT_AI_WORKER_MAX_ATTEMPTS:-3}
      AIOT_AI_TOOL_MAX_ROUNDS: ${AIOT_AI_TOOL_MAX_ROUNDS:-4}
      AIOT_AI_TOOL_MAX_CALLS: ${AIOT_AI_TOOL_MAX_CALLS:-8}
      AIOT_PATROL_SCHEDULER_SECONDS: ${AIOT_PATROL_SCHEDULER_SECONDS:-5}
      AIOT_COMMAND_ACK_TIMEOUT_SECONDS: ${AIOT_COMMAND_ACK_TIMEOUT_SECONDS:-60}
      AIOT_LLM_ENDPOINT: ${AIOT_LLM_ENDPOINT:-mock}
      AIOT_LLM_API_KEY: ${AIOT_LLM_API_KEY:-}
      AIOT_LLM_MODEL: ${AIOT_LLM_MODEL:-deepseek-v4-flash}
      AIOT_LLM_TIMEOUT_SECONDS: ${AIOT_LLM_TIMEOUT_SECONDS:-60}
      AIOT_LLM_RESPONSE_FORMAT: ${AIOT_LLM_RESPONSE_FORMAT:-json_object}
      AIOT_LLM_THINKING_ENABLED: ${AIOT_LLM_THINKING_ENABLED:-false}
      AIOT_LLM_REASONING_EFFORT: ${AIOT_LLM_REASONING_EFFORT:-high}
    volumes:
      - aiot_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_* 是构建期内联变量，运行期 environment 对已构建的 bundle 无效
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  aiot_postgres_data:
  aiot_emqx_data:
  aiot_emqx_log:
  aiot_uploads:
